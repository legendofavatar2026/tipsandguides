<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Complete Legend of Avatar guide including hero tier list, divine weapons combinations, world boss guides, tower guides and progression calculator.">
<title>Legend of Avatar Guide</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<img src="assets/banner.png" class="banner" alt="Legend of Avatar">

<nav class="tabs">
<button class="tab active" data-tab="guides">Guides</button>
<button class="tab" data-tab="avatars">Avatar Tier List</button>
<button class="tab" data-tab="weapons">Divine Weapons</button>
<button class="tab" data-tab="calculator">Training EXP Calculator</button>
<button class="tab" data-tab="tips">Tips & Codes</button>
</nav>
</header>


<section id="guides" class="tabContent active">

<h2>World Boss Guides</h2>

<div class="grid" id="bossGrid"></div>

<div id="guideMenu"></div>

<div id="viewer">
<img id="guideImage">
</div>

</section>


<section id="avatars" class="tabContent">

<h2>Hero Tier List</h2>

<div id="avatarContainer"></div>

</section>


<section id="weapons" class="tabContent">

<h2>Divine Weapons</h2>

<div id="weaponContainer"></div>

</section>


<section id="calculator" class="tabContent">

<h2>Training EXP Calculator</h2>

<div class="training-box">

<label>EXP Gain per Minute</label>
<input id="expPerMin">

<label>EXP Tier</label>
<select id="currentTier"></select>

<label>Target EXP</label>
<input id="targetAmount">

<label>Target Tier</label>
<select id="targetTier"></select>

<button id="calcBtn">Calculate</button>

<div id="trainingResult"></div>

</div>

</section>


<section id="tips" class="tabContent">

<h2>Gift Codes</h2>

<div id="codesContainer" class="codes"></div>

</section>

<footer class="mini-footer">
Fan-made guide. Not affiliated with the official game or publisher.
</footer>

<script src="script.js"></script>

</body>
</html>
