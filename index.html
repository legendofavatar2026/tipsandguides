<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Game Guide</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
<img src="assets/banner.png" class="banner">
</header>

<h2>World Boss Guides</h2>

<div id="bossContainer">

<div class="boss" onclick="openBoss('ironspider')">
<img src="assets/guide/ironspider.png">
<p>Iron Spider</p>
</div>

<div class="boss" onclick="openBoss('poisonivy')">
<img src="assets/guide/poisonivy.png">
<p>Poison Ivy</p>
</div>

<div class="boss" onclick="openBoss('abyssaltyrant')">
<img src="assets/guide/abyssaltyrant.png">
<p>Abyssal Tyrant</p>
</div>

</div>

<h2>Infinite Tower Guides</h2>

<div id="towerContainer">

<div class="boss" onclick="openBoss('ironspider')">
<img src="assets/guide/tower_steel.png">
<p>Tower of Steel</p>
</div>

<div class="boss" onclick="openBoss('poisonivy')">
<img src="assets/guide/tower_gale.png">
<p>Tower of Gale</p>
</div>

<div class="boss" onclick="openBoss('abyssaltyrant')">
<img src="assets/guide/tower_rift.png">
<p>Tower of Rift</p>
</div>

</div>

<div id="guideMenu"></div>

<div id="viewer">
<img id="guideImage">
</div>

<script src="script.js"></script>

</body>

</html>
