name: Update Google Analytics

on:
  workflow_dispatch:

  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  update:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependency
        run: npm install @google-analytics/data

      - name: Generate stats.json
        run: node scripts/updateStats.js
        env:
          GA_PROPERTY_ID: ${{ secrets.GA_PROPERTY_ID }}
          GA_SERVICE_ACCOUNT: ${{ secrets.GA_SERVICE_ACCOUNT }}

      - name: Commit stats
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add stats.json
          git diff --cached --quiet || git commit -m "Update analytics"
          git push